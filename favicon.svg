<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0eeff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Document / gabarito sheet (answer sheet) -->
  <rect x="14" y="10" width="26" height="34" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="16" y="13" width="14" height="2.5" rx="1.25" fill="rgba(255,255,255,0.6)"/>
  <!-- Answer bubbles: row 1 -->
  <circle cx="20" cy="21" r="2.2" fill="rgba(255,255,255,0.9)"/>
  <circle cx="26" cy="21" r="2.2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="32" cy="21" r="2.2" fill="rgba(255,255,255,0.3)"/>
  <!-- Answer bubbles: row 2 -->
  <circle cx="20" cy="28" r="2.2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="26" cy="28" r="2.2" fill="rgba(255,255,255,0.9)"/>
  <circle cx="32" cy="28" r="2.2" fill="rgba(255,255,255,0.3)"/>
  <!-- Answer bubbles: row 3 -->
  <circle cx="20" cy="35" r="2.2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="26" cy="35" r="2.2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="32" cy="35" r="2.2" fill="rgba(255,255,255,0.9)"/>

  <!-- Bold checkmark overlapping bottom-right of document -->
  <g transform="translate(28, 30)">
    <!-- Checkmark background circle -->
    <circle cx="14" cy="14" r="13" fill="#22c55e"/>
    <!-- Bold check path -->
    <polyline points="6,14 11,20 22,8"
              fill="none"
              stroke="white"
              stroke-width="3.5"
              stroke-linecap="round"
              stroke-linejoin="round"/>
  </g>
</svg>
